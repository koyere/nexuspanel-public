name: 🐛 Bug Report
description: Report a bug to help us improve
title: "[BUG] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        ## 🔍 Transparency Notice
        This bug report will be publicly visible as part of our commitment to transparency. 
        Please do not include sensitive information like tokens, passwords, or private server details.

  - type: checkboxes
    id: security-check
    attributes:
      label: Security Check
      description: Please confirm this is not a security vulnerability
      options:
        - label: This is NOT a security vulnerability (for security issues, email security@nexus-panel.com)
          required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
      placeholder: Describe what you expected to happen...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
      placeholder: Describe what actually happened...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error Logs
      description: If applicable, add error logs (remove sensitive information)
      render: shell

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How severe is this bug?
      options:
        - Low - Minor inconvenience
        - Medium - Affects functionality but has workaround
        - High - Major functionality broken
        - Critical - Bot completely unusable
    validations:
      required: true

  - type: input
    id: bot-version
    attributes:
      label: Bot Version
      description: What version of the bot are you using?
      placeholder: e.g., 2.0.0
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Where did this occur?
      options:
        - Production (live bot)
        - Development (testing)
        - Local development
    validations:
      required: true

  - type: input
    id: server-size
    attributes:
      label: Server Size
      description: Approximate number of members in your Discord server
      placeholder: e.g., 500 members

  - type: checkboxes
    id: reproduction
    attributes:
      label: Reproduction
      description: Have you been able to reproduce this bug?
      options:
        - label: I can reproduce this bug consistently
        - label: This bug happens occasionally
        - label: This bug happened only once

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context about the problem here

  - type: checkboxes
    id: transparency-commitment
    attributes:
      label: Transparency Commitment
      description: Our transparency commitment
      options:
        - label: I understand this report will be publicly visible for transparency
          required: true
        - label: I have removed all sensitive information from this report
          required: true