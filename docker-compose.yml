version: '3.8'

services:
  nexus-bot:
    build: .
    container_name: nexus_bot
    restart: unless-stopped
    ports:
      - "3002:3002"  # Bot API
      - "9090:9090"  # Metrics
    environment:
      - NODE_ENV=production
      - BOT_MODE=standalone
      - DATABASE_URL=${DATABASE_URL}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - BOT_INTERNAL_API_KEY=${BOT_INTERNAL_API_KEY}
      - BACKEND_API_URL=https://api.nexus-panel.com
      - PANEL_VPS_IP=185.73.243.34
      - CORS_ORIGINS=https://nexus-panel.com,https://185.73.243.34
      - MONITORING_ENABLED=true
      - LOG_LEVEL=info
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - nexus-network

  # Prometheus for monitoring (optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: nexus_bot_prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    depends_on:
      - nexus-bot
    networks:
      - nexus-network

  # Grafana for visualization (optional)
  grafana:
    image: grafana/grafana:latest
    container_name: nexus_bot_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - nexus-network

networks:
  nexus-network:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data: