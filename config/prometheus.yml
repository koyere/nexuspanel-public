global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  - job_name: 'nexus-bot'
    static_configs:
      - targets: ['nexus-bot:9090']
    scrape_interval: 30s
    metrics_path: '/api/metrics/prometheus'
    scheme: http

  - job_name: 'nexus-bot-api'
    static_configs:
      - targets: ['nexus-bot:3002']
    scrape_interval: 60s
    metrics_path: '/health'
    scheme: http